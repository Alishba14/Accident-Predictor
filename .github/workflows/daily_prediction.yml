name: Daily Accident Risk Prediction

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict-and-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib pytest  # Added pytest here

      - name: Run Test Suite
        run: pytest -v

      - name: Run daily risk prediction
        run: python predict_daily_risk.py

      - name: Commit and push updated risk log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add daily_risk_log.csv

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update daily risk log"
            git pull --rebase origin main
            git push
          fi